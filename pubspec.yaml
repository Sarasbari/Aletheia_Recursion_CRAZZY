name: sigil
description: Cryptographic image authenticity and verification on blockchain.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Image
  image_picker: ^1.0.4
  camera: ^0.10.5+2
  video_player: ^2.8.2
  
  # Crypto
  crypto: ^3.0.3
  convert: ^3.1.1
  
  # Wallet / Web3
  walletconnect_flutter_v2: ^2.1.7
  url_launcher: ^6.2.1
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI / Sharing
  share_plus: ^7.2.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2
  google_fonts: ^6.1.0
  provider: ^6.1.1
  
  # Networking
  dio: ^5.4.0
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1
  exif: ^3.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
